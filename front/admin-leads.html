<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Leads - Dra. Lolla</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #111; color: #f5f5f5; }
    main { max-width: 1100px; margin: 0 auto; padding: 32px 18px; }
    h1 { margin-bottom: 6px; }
    p { color: #ccc; }
    .box { background: #1b1b1b; border: 1px solid #333; border-radius: 14px; padding: 18px; margin: 18px 0; }
    input, button { padding: 12px; border-radius: 8px; border: 1px solid #444; }
    input { width: min(380px, 100%); background: #0f0f0f; color: #fff; }
    button { cursor: pointer; background: #d4af37; color: #111; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
    th, td { border-bottom: 1px solid #333; text-align: left; padding: 10px; vertical-align: top; }
    th { color: #d4af37; }
    .error { color: #ff8a8a; }
    .muted { color: #aaa; font-size: 13px; }
    .table-wrap { overflow-x: auto; }
  </style>
</head>
<body>
  <main>
    <h1>Painel de Leads</h1>
    <p>Use o token configurado na variável <strong>ADMIN_TOKEN</strong> da Railway para visualizar os contatos enviados pelo site.</p>

    <div class="box">
      <input id="token" type="password" placeholder="Digite seu ADMIN_TOKEN">
      <button id="loadBtn">Carregar leads</button>
      <p id="message" class="muted"></p>
    </div>

    <section class="box">
      <h2>Contatos do Popup</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Data</th><th>Contato</th><th>Tipo</th><th>Página</th></tr>
          </thead>
          <tbody id="leadsBody"><tr><td colspan="4" class="muted">Nenhum dado carregado.</td></tr></tbody>
        </table>
      </div>
    </section>

    <section class="box">
      <h2>Agendamentos</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Data</th><th>Nome</th><th>Telefone</th><th>E-mail</th><th>Serviço</th><th>Preferência</th><th>Mensagem</th></tr>
          </thead>
          <tbody id="agendamentosBody"><tr><td colspan="7" class="muted">Nenhum dado carregado.</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    function safe(value) {
      return String(value || '').replace(/[&<>'"]/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[char]));
    }

    function formatDate(value) {
      if (!value) return '';
      return new Date(value).toLocaleString('pt-BR');
    }

    document.getElementById('loadBtn').addEventListener('click', async () => {
      const token = document.getElementById('token').value.trim();
      const message = document.getElementById('message');
      const leadsBody = document.getElementById('leadsBody');
      const agendamentosBody = document.getElementById('agendamentosBody');

      message.textContent = 'Carregando...';
      message.className = 'muted';

      try {
        const response = await fetch(`/api/admin/leads?token=${encodeURIComponent(token)}`);
        const result = await response.json();
        if (!response.ok || !result.ok) throw new Error(result.message || 'Erro ao carregar dados.');

        leadsBody.innerHTML = result.leads.length ? result.leads.map(item => `
          <tr>
            <td>${safe(formatDate(item.createdAt))}</td>
            <td>${safe(item.contact)}</td>
            <td>${safe(item.contactType)}</td>
            <td>${safe(item.page)}</td>
          </tr>
        `).join('') : '<tr><td colspan="4" class="muted">Nenhum lead ainda.</td></tr>';

        agendamentosBody.innerHTML = result.agendamentos.length ? result.agendamentos.map(item => `
          <tr>
            <td>${safe(formatDate(item.createdAt))}</td>
            <td>${safe(item.nome)}</td>
            <td>${safe(item.telefone)}</td>
            <td>${safe(item.email)}</td>
            <td>${safe(item.servico)}</td>
            <td>${safe(item.data)} / ${safe(item.horario)}</td>
            <td>${safe(item.mensagem)}</td>
          </tr>
        `).join('') : '<tr><td colspan="7" class="muted">Nenhum agendamento ainda.</td></tr>';

        message.textContent = 'Dados carregados com sucesso.';
      } catch (error) {
        message.textContent = error.message;
        message.className = 'error';
      }
    });
  </script>
</body>
</html>
